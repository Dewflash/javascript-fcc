<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown to HTML Converter</title>
    <link rel="stylesheet" href="mdtohtml.css">
</head>
<body>
    <h1>Markdown to HTML Converter</h1>
    
    <div id="main-wrapper">
        <div class="container">
            <h2>Markdown Input:</h2>
            <textarea id="markdown-input" placeholder="Enter markdown here..."></textarea>
        </div>
        
        <div class="container">
            <h2>HTML Output:</h2>
            <pre id="html-output"></pre>
        </div>
        
        <div class="container">
            <h2>Preview:</h2>
            <div id="preview"></div>
        </div>
    </div>

    <script src="mdtohtml.js"></script>
</body>
</html>
